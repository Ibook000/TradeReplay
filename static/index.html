<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trade Replay</title>
    <script src="/static/js/lightweight-charts.standalone.production.js"></script>
    <script src="/static/js/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=9">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="header">
                <div class="header-top">
                    <h1>Trade Replay</h1>
                    <span class="header-badge" id="totalBadge">--</span>
                </div>
                <div class="symbol-selector">
                    <select id="symbolSelect">
                        <option>Loading...</option>
                    </select>
                </div>
                <div class="filter-row">
                    <select id="exchangeSelect">
                        <option value="">All Exchanges</option>
                        <option value="OKX">OKX</option>
                        <option value="Bybit">Bybit</option>
                    </select>
                    <select id="daysSelect">
                        <option value="7">7D</option>
                        <option value="14">14D</option>
                        <option value="30" selected>30D</option>
                        <option value="60">60D</option>
                        <option value="90">90D</option>
                        <option value="180">180D</option>
                        <option value="365">1Y</option>
                    </select>
                </div>
                <div class="controls">
                    <button id="refreshBtn">Refresh</button>
                    <button id="statsBtn" class="stats-toggle">Stats</button>
                    <button id="aiAnalyzeBtn" class="ai-btn">AI</button>
                    <button id="settingsBtn" class="settings-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                </div>
                <div class="stats" id="stats"></div>
            </div>
            <div class="trade-list" id="tradeList">
                <div class="loading"><div class="spinner"></div>Loading...</div>
            </div>
        </div>
        <div class="main">
            <div class="chart-header" id="chartHeader">
                <span class="info">Select a trade to view details</span>
            </div>
            <div class="chart-container">
                <div id="chart"></div>
            </div>
        </div>
    </div>

    <!-- Stats Panel -->
    <div class="stats-panel" id="statsPanel">
        <div class="panel-header">
            <h2>Statistics</h2>
            <button class="close-btn" id="closeStatsBtn">&times;</button>
        </div>
        <div class="panel-content" id="statsContent"></div>
    </div>

    <!-- AI Panel -->
    <div class="ai-panel" id="aiPanel">
        <div class="panel-header">
            <h2>AI Coach</h2>
            <div style="display:flex;align-items:center;gap:8px;">
                <span id="aiCacheTag" style="font-size:9px;color:#5a5a6e;display:none;">cached</span>
                <button id="aiReanalyzeBtn" style="background:#1a1a25;border:1px solid #28283a;color:#8a8a9a;padding:3px 8px;border-radius:3px;font-size:9px;cursor:pointer;font-family:inherit;display:none;">Re-analyze</button>
            </div>
            <button class="close-btn" id="closeAiPanel">&times;</button>
        </div>
        <div class="panel-content" id="aiContent">
            <div class="ai-loading" id="aiLoading">
                <div class="spinner"></div>
                <span>Analyzing trades...</span>
            </div>
            <div class="ai-result" id="aiResult" style="display: none;"></div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="panel-header">
            <h2>Settings</h2>
            <button class="close-btn" id="closeSettingsBtn">&times;</button>
        </div>
        <div class="panel-content settings-content">
            <!-- Status Row -->
            <div class="settings-status-row">
                <div class="status-dot-group">
                    <div class="status-dot" id="okxStatusDot"></div>
                    <span>OKX</span>
                </div>
                <div class="status-dot-group">
                    <div class="status-dot" id="bybitStatusDot"></div>
                    <span>Bybit</span>
                </div>
                <div class="status-dot-group">
                    <div class="status-dot" id="aiStatusDot"></div>
                    <span>AI</span>
                </div>
            </div>

            <!-- OKX -->
            <div class="settings-block">
                <div class="settings-block-title">
                    <span class="tag tag-okx">OKX</span>
                    API Configuration
                </div>
                <div class="form-row">
                    <label>API Key</label>
                    <div class="input-group">
                        <input type="password" id="okxApiKey" placeholder="API Key">
                        <button class="eye-btn" onclick="App.togglePassword('okxApiKey')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="form-hint">Current: <code id="okxKeyMasked">--</code></div>
                </div>
                <div class="form-row">
                    <label>Secret Key</label>
                    <div class="input-group">
                        <input type="password" id="okxSecretKey" placeholder="Secret Key">
                        <button class="eye-btn" onclick="App.togglePassword('okxSecretKey')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="form-hint">Current: <code id="okxSecretMasked">--</code></div>
                </div>
                <div class="form-row">
                    <label>Passphrase</label>
                    <div class="input-group">
                        <input type="password" id="okxPassphrase" placeholder="Passphrase">
                    </div>
                </div>
                <div class="form-actions">
                    <button onclick="App.saveExchangeConfig('okx')" class="btn btn-primary">Save</button>
                    <button onclick="App.testExchange('okx')" class="btn btn-secondary">Test</button>
                </div>
                <div class="form-status" id="okxStatus"></div>
            </div>

            <!-- Bybit -->
            <div class="settings-block">
                <div class="settings-block-title">
                    <span class="tag tag-bybit">Bybit</span>
                    API Configuration
                </div>
                <div class="form-row">
                    <label>API Key</label>
                    <div class="input-group">
                        <input type="password" id="bybitApiKey" placeholder="API Key">
                        <button class="eye-btn" onclick="App.togglePassword('bybitApiKey')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="form-hint">Current: <code id="bybitKeyMasked">--</code></div>
                </div>
                <div class="form-row">
                    <label>Secret Key</label>
                    <div class="input-group">
                        <input type="password" id="bybitSecretKey" placeholder="Secret Key">
                        <button class="eye-btn" onclick="App.togglePassword('bybitSecretKey')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="form-hint">Current: <code id="bybitSecretMasked">--</code></div>
                </div>
                <div class="form-actions">
                    <button onclick="App.saveExchangeConfig('bybit')" class="btn btn-primary">Save</button>
                    <button onclick="App.testExchange('bybit')" class="btn btn-secondary">Test</button>
                </div>
                <div class="form-status" id="bybitStatus"></div>
            </div>

            <!-- AI -->
            <div class="settings-block">
                <div class="settings-block-title">
                    <span class="tag tag-ai">AI</span>
                    LLM Configuration
                </div>
                <div class="form-row">
                    <label>Base URL</label>
                    <div class="input-group">
                        <input type="text" id="aiBaseUrl" placeholder="https://api.openai.com/v1">
                    </div>
                </div>
                <div class="form-row">
                    <label>API Key</label>
                    <div class="input-group">
                        <input type="password" id="aiApiKey" placeholder="sk-...">
                        <button class="eye-btn" onclick="App.togglePassword('aiApiKey')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="form-hint">Current: <code id="aiKeyMasked">--</code></div>
                </div>
                <div class="form-row">
                    <label>Model</label>
                    <div class="input-group">
                        <input type="text" id="aiModel" placeholder="gpt-4o">
                    </div>
                </div>
                <div class="form-actions">
                    <button onclick="App.saveAiConfig()" class="btn btn-primary">Save</button>
                    <button onclick="App.testAi()" class="btn btn-secondary">Test</button>
                </div>
                <div class="form-status" id="aiStatus"></div>
                <div class="preset-row">
                    <span class="preset-label">Presets:</span>
                    <button class="preset-btn" onclick="App.fillAiExample('https://api.deepseek.com/v1', 'deepseek-chat')">DeepSeek</button>
                    <button class="preset-btn" onclick="App.fillAiExample('https://api.openai.com/v1', 'gpt-4o')">OpenAI</button>
                    <button class="preset-btn" onclick="App.fillAiExample('https://api.groq.com/openai/v1', 'llama-3.1-70b-versatile')">Groq</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js?v=9"></script>
    <script src="/static/js/api.js?v=9"></script>
    <script src="/static/js/chart.js?v=9"></script>
    <script src="/static/js/trades.js?v=9"></script>
    <script src="/static/js/app.js?v=9"></script>
</body>
</html>
